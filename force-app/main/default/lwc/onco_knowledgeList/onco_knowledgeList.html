<template>
    <div class="container">
        <div class="header">
            <h2 class="heading">Knowledge Center</h2>
            <!-- <p class="subheading">Browse all articles</p> -->
        </div>

        <template if:true={isLoading}>
            <div class="loading">
                <lightning-spinner
                    alternative-text="Loading"
                    size="medium">
                </lightning-spinner>
            </div>
        </template>

        <template if:false={isLoading}>
            <template if:false={isEmpty}>
                <lightning-datatable
                    key-field="Id"
                    data={articles}
                    columns={columns}
                    hide-checkbox-column
                    onrowaction={handleRowAction}>
                </lightning-datatable>
            </template>

            <template if:true={isEmpty}>
                <div class="empty">No articles found.</div>
            </template>
        </template>

    </div>
</template>
